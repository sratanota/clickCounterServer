<!DOCTYPE html>
<html>

<head>
    <title>Click Counter Game</title>
</head>

<body>

    <h1>Click Counter Game</h1>

    <div>
        Status: <span id="status">Disconnected</span>
    </div>

    <div>
        Players:
        <ul id="players"></ul>
    </div>

    <h2>Counter: <span id="counter">0</span></h2>

    <input id="nameInput" placeholder="Enter your name">

    <button onclick="register()">Register</button>

    <button id="clickBtn" onclick="sendClick()" disabled>
        Click
    </button>

    <button onclick="connect()">Retry</button>

    <script>

        let ws

        function setStatus(text) {
            document.getElementById("status").innerText = text
        }

        function connect() {

            setStatus("Connecting...")

            ws = new WebSocket("wss://clickcounterserver.onrender.com")

            ws.onopen = () => {
                setStatus("Connected")
            }

            ws.onmessage = (event) => {

                const msg = JSON.parse(event.data)

                if (msg.type === "playerList") {
                    updatePlayers(msg.data.players)
                }

                if (msg.type === "start") {
                    document.getElementById("clickBtn").disabled = false
                }

                if (msg.type === "counter") {
                    document.getElementById("counter").innerText = msg.data.value
                }

                if (msg.type === "serverFull") {
                    alert(msg.data.message)
                }

            }

            ws.onclose = () => {
                setStatus("Disconnected")
                document.getElementById("clickBtn").disabled = true
            }

        }

        function register() {

            const name = document.getElementById("nameInput").value

            ws.send(JSON.stringify({
                type: "register",
                data: { name }
            }))
        }

        function sendClick() {

            ws.send(JSON.stringify({
                type: "click"
            }))
        }

        function updatePlayers(players) {

            const list = document.getElementById("players")
            list.innerHTML = ""

            players.forEach(p => {

                const li = document.createElement("li")
                li.innerText = p

                list.appendChild(li)

            })
        }

        connect()

    </script>

</body>

</html>
